<article class="car-card" data-reveal>
  <div class="car-card__media">
    <span class="car-card__badge">В наличии</span>
    <div class="car-card__slider" data-card-slider data-index="0">
      <div class="car-card__track">
        <picture class="car-card__slide"><source srcset="img/card/car-t8.webp" type="image/webp" /><img src="img/card/car-t8.png" alt="TENET T8" loading="lazy" /></picture>
        <picture class="car-card__slide"><source srcset="img/card/car-t8.webp" type="image/webp" /><img src="img/card/car-t8.png" alt="TENET T8" loading="lazy" /></picture>
        <picture class="car-card__slide"><source srcset="img/card/car-t8.webp" type="image/webp" /><img src="img/card/car-t8.png" alt="TENET T8" loading="lazy" /></picture>
      </div>
      <div class="car-card__zones" aria-hidden="true"><span></span><span></span><span></span></div>
    </div>
    <div class="car-card__dots">
      <span class="is-active"></span><span></span><span></span>
    </div>
    <div class="car-card__actions car-card__actions--top">
      <button class="car-card__icon-btn js-card-like" type="button" aria-label="В избранное">
        <svg class="car-card__ico car-card__ico--line" aria-hidden="true"><use href="#icon-heart"></use></svg>
        <svg class="car-card__ico car-card__ico--fill" aria-hidden="true"><use href="#icon-heart-fill"></use></svg>
      </button>
      <button class="car-card__icon-btn js-card-compare" type="button" aria-label="К сравнению">
        <svg class="car-card__ico car-card__ico--line" aria-hidden="true"><use href="#icon-comparison"></use></svg>
        <svg class="car-card__ico car-card__ico--fill" aria-hidden="true"><use href="#icon-comparison-fill"></use></svg>
      </button>
    </div>
  </div>

  <div class="car-card__body">
    <h3 class="car-card__title">TENET T8</h3>
    <p class="car-card__subtitle">Лайн, МКПП/MT Line, 2026</p>

    <ul class="car-card__specs">
      <li><img src="img/card/spec-engine.svg" width="16" height="16" alt="" aria-hidden="true" /> 1.5 литра</li>
      <li><img src="img/card/spec-transmission.svg" width="16" height="16" alt="" aria-hidden="true" /> Вариатор</li>
      <li><img src="img/card/spec-drive.svg" width="16" height="16" alt="" aria-hidden="true" /> Передний привод</li>
    </ul>

    <div class="car-card__pricing">
      <div class="car-card__prices">
        <span class="car-card__price">2 291 000 ₽</span>
        <span class="car-card__price-old">2 291 000 ₽</span>
      </div>
      <div class="car-card__actions car-card__actions--bottom">
        <button class="car-card__icon-btn is-active js-card-like" type="button" aria-label="В избранное">
          <svg class="car-card__ico car-card__ico--line" aria-hidden="true"><use href="#icon-heart"></use></svg>
          <svg class="car-card__ico car-card__ico--fill" aria-hidden="true"><use href="#icon-heart-fill"></use></svg>
        </button>
        <button class="car-card__icon-btn js-card-compare" type="button" aria-label="К сравнению">
          <svg class="car-card__ico car-card__ico--line" aria-hidden="true"><use href="#icon-comparison"></use></svg>
          <svg class="car-card__ico car-card__ico--fill" aria-hidden="true"><use href="#icon-comparison-fill"></use></svg>
        </button>
      </div>
    </div>

    <button class="btn btn--outline btn--block car-card__cta" type="button">
      <span class="car-card__cta-dot" aria-hidden="true"><span class="car-card__cta-ring"></span><span class="car-card__cta-ring"></span></span>Online — бронирование
    </button>
  </div>
</article>
