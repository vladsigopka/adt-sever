<article class="benefit-card" data-reveal data-reveal-delay="@@delay">
  <picture class="benefit-card__media">
    <source srcset="img/hero/slide-1.webp" type="image/webp" />
    <img src="img/hero/slide-1.png" alt="" loading="lazy" />
  </picture>
  <span class="benefit-card__num" aria-hidden="true">@@num</span>
  <span class="benefit-card__tag">Какой-то заголовок</span>
  <h3 class="benefit-card__title">Какое-то преимущество заголовок</h3>
  <a class="benefit-card__btn" href="catalog.html">Каталог автомобилей</a>
</article>
